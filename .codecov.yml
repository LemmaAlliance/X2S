# Codecov configuration for X2S
# https://docs.codecov.io/docs/codecov-yaml

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: auto
        threshold: 1%
        informational: true

comment:
  layout: "header, diff, files"
  behavior: default
  require_changes: false

ignore:
  - "external/**/*"
  - "build/**/*"
  - "tests/**/*"
  - "**/cJSON.*"
