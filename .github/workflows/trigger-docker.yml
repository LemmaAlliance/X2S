name: Trigger X2S-Docker rebuild

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag/branch) to send to X2S-Docker'
        required: false
        default: ''
  release:
    types: [published]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to X2S-Docker
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/LemmaAlliance/X2S-Docker/dispatches \
            -d '{"event_type":"source-released","client_payload":{"ref":"${{ inputs.ref || github.ref_name }}"}}'
